<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>工运 — 打工人每日运势</title>
<meta name="description" content="不看星座不看八字，看你的工位朝向算今日工运！打工人专属每日运势。">
<meta property="og:title" content="工运 — 打工人每日运势">
<meta property="og:description" content="测测你今天的打工运势，摸鱼运、汇报运、加薪运...全方位预测！">
<meta property="og:type" content="website">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #06060f;
    --card: rgba(18,18,42,0.85);
    --card-solid: #12122a;
    --card-border: rgba(255,255,255,0.08);
    --accent: #f5c542;
    --accent2: #ff8c42;
    --accent-dim: rgba(245,197,66,0.12);
    --text: #e8e8f0;
    --text-dim: #7777aa;
    --good: #5fe0a0;
    --bad: #f06070;
    --blue: #60a0ff;
    --purple: #a07cff;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ====== Canvas 粒子背景 ====== */
  #particleCanvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }

  /* ====== 渐变光晕 ====== */
  .glow-orb {
    position: fixed; border-radius: 50%;
    filter: blur(80px); pointer-events: none; z-index: 0;
    opacity: 0.3;
  }
  .glow-orb.o1 { width: 300px; height: 300px; background: #f5c542; top: -100px; right: -80px; }
  .glow-orb.o2 { width: 250px; height: 250px; background: #a07cff; bottom: 10%; left: -80px; }
  .glow-orb.o3 { width: 200px; height: 200px; background: #60a0ff; top: 40%; right: -60px; opacity: 0.2; }

  /* ====== 容器 ====== */
  .container {
    position: relative; z-index: 1;
    max-width: 420px; margin: 0 auto;
    padding: 20px 20px 80px;
    min-height: 100vh;
  }

  /* ====== 头部 ====== */
  .header { text-align: center; padding: 36px 0 12px; }
  .logo-wrap {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 80px; height: 80px;
    border-radius: 24px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    margin-bottom: 12px;
    box-shadow: 0 8px 32px rgba(245,197,66,0.25);
    font-size: 40px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .title {
    font-size: 36px; font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2), #ff6b6b);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientMove 3s ease infinite;
  }
  @keyframes gradientMove {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .subtitle {
    font-size: 13px; color: var(--text-dim);
    margin-top: 4px; letter-spacing: 4px;
  }
  .date-badge {
    margin-top: 14px;
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--accent);
    background: var(--accent-dim);
    padding: 6px 16px; border-radius: 20px;
    border: 1px solid rgba(245,197,66,0.15);
  }
  .date-badge::before { content: '📅'; }

  /* ====== 页面切换 ====== */
  .page { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
  .page.hidden {
    opacity: 0; transform: translateY(30px) scale(0.98);
    pointer-events: none; position: absolute; width: calc(100% - 40px);
  }

  /* ====== 步骤指示器 ====== */
  .step-indicator {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; margin: 20px 0 8px;
  }
  .step-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.1);
    transition: all 0.3s;
  }
  .step-dot.active {
    background: var(--accent);
    box-shadow: 0 0 8px rgba(245,197,66,0.5);
    width: 24px; border-radius: 4px;
  }
  .step-dot.done { background: var(--good); }

  /* ====== Section ====== */
  .section {
    background: var(--card);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 14px;
    animation: fadeUp 0.5s ease-out both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .section:nth-child(2) { animation-delay: 0.05s; }
  .section:nth-child(3) { animation-delay: 0.1s; }
  .section:nth-child(4) { animation-delay: 0.15s; }
  .section:nth-child(5) { animation-delay: 0.2s; }

  .section-label {
    font-size: 14px; font-weight: 700; margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
    color: var(--text);
  }
  .section-label .num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 7px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #1a1a2e; font-size: 12px; font-weight: 800;
  }

  /* ====== 选项 ====== */
  .opt-grid { display: grid; gap: 10px; }
  .opt-grid.c2 { grid-template-columns: 1fr 1fr; }
  .opt-grid.c3 { grid-template-columns: 1fr 1fr 1fr; }
  .opt-grid.c4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

  .opt {
    background: rgba(255,255,255,0.03);
    border: 1.5px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 14px 6px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    overflow: hidden;
  }
  .opt::after {
    content: '';
    position: absolute; top: 50%; left: 50%;
    width: 0; height: 0;
    background: rgba(245,197,66,0.15);
    border-radius: 50%;
    transition: all 0.4s;
    transform: translate(-50%, -50%);
  }
  .opt:active { transform: scale(0.94); }
  .opt.selected {
    border-color: var(--accent);
    background: var(--accent-dim);
    box-shadow: 0 0 24px rgba(245,197,66,0.12), inset 0 0 20px rgba(245,197,66,0.05);
  }
  .opt.selected::after { width: 120%; height: 120%; }
  .opt .emoji { font-size: 26px; display: block; margin-bottom: 4px; position: relative; z-index: 1; }
  .opt .txt {
    font-size: 11px; color: var(--text-dim);
    transition: color 0.3s; position: relative; z-index: 1;
    font-weight: 500;
  }
  .opt.selected .txt { color: var(--accent); font-weight: 600; }

  /* 数字按钮 */
  .num-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
  }
  .nbtn {
    aspect-ratio: 1;
    border-radius: 14px;
    background: rgba(255,255,255,0.03);
    border: 1.5px solid rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 800;
    cursor: pointer;
    transition: all 0.3s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    color: var(--text-dim);
  }
  .nbtn:active { transform: scale(0.9); }
  .nbtn.selected {
    border-color: var(--accent);
    background: var(--accent-dim);
    color: var(--accent);
    box-shadow: 0 0 20px rgba(245,197,66,0.15);
  }

  /* ====== 开始按钮 ====== */
  .go-btn {
    width: 100%; margin-top: 20px;
    padding: 18px; border-radius: 18px;
    border: none; font-size: 18px; font-weight: 800;
    cursor: pointer;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #1a1a2e;
    letter-spacing: 3px;
    position: relative; overflow: hidden;
    transition: all 0.3s;
    box-shadow: 0 4px 24px rgba(245,197,66,0.3);
  }
  .go-btn:disabled {
    opacity: 0.3; cursor: not-allowed;
    box-shadow: none;
  }
  .go-btn:not(:disabled):hover {
    box-shadow: 0 6px 32px rgba(245,197,66,0.45);
    transform: translateY(-1px);
  }
  .go-btn:not(:disabled):active { transform: scale(0.97) translateY(0); }
  .go-btn .shine {
    position: absolute;
    top: 0; left: -100%; width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
    animation: shine 2.5s infinite;
  }
  @keyframes shine { 100% { left: 150%; } }

  /* ====== 加载页 ====== */
  .loader-overlay {
    position: fixed; inset: 0;
    background: rgba(6,6,15,0.97);
    z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s;
  }
  .loader-overlay.show { opacity: 1; pointer-events: all; }

  .bagua {
    width: 100px; height: 100px;
    animation: spinSlow 3s linear infinite;
    position: relative;
  }
  .bagua-inner {
    font-size: 90px;
    line-height: 1;
  }
  @keyframes spinSlow { 100% { transform: rotate(360deg); } }

  .loader-text {
    margin-top: 28px;
    font-size: 16px;
    color: var(--accent);
    font-weight: 600;
    text-align: center;
  }
  .loader-sub {
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-dim);
    animation: blink 1.5s ease-in-out infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

  /* 进度条 */
  .progress-bar {
    width: 200px; height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    margin-top: 24px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%; width: 0;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.3s;
  }

  /* ====== 结果页 ====== */
  .result-section {
    background: var(--card);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 24px 20px;
    margin-bottom: 14px;
    animation: fadeUp 0.6s ease-out both;
  }
  .result-section:nth-child(1) { animation-delay: 0.1s; }
  .result-section:nth-child(2) { animation-delay: 0.2s; }
  .result-section:nth-child(3) { animation-delay: 0.3s; }
  .result-section:nth-child(4) { animation-delay: 0.4s; }
  .result-section:nth-child(5) { animation-delay: 0.5s; }
  .result-section:nth-child(6) { animation-delay: 0.6s; }
  .result-section:nth-child(7) { animation-delay: 0.7s; }

  .r-title {
    font-size: 13px; font-weight: 700;
    color: var(--text-dim);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 6px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* 总评大卡 */
  .hero-card {
    text-align: center;
    padding: 32px 20px;
    background: linear-gradient(180deg, var(--card) 0%, rgba(18,18,42,0.95) 100%);
    position: relative;
  }
  .hero-card::before {
    content: '';
    position: absolute; top: -1px; left: 20%; right: 20%; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }
  .hero-emoji {
    font-size: 72px; line-height: 1;
    animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) 0.3s both;
  }
  @keyframes bounceIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .hero-label {
    font-size: 32px; font-weight: 900;
    margin: 8px 0 4px;
    animation: fadeUp 0.5s 0.4s both;
  }
  .hero-stars {
    font-size: 24px; letter-spacing: 6px;
    margin: 8px 0;
    animation: fadeUp 0.5s 0.5s both;
  }
  .hero-score-ring {
    display: inline-flex; align-items: center; justify-content: center;
    width: 80px; height: 80px;
    border-radius: 50%;
    margin-top: 12px;
    position: relative;
  }
  .hero-score-ring svg {
    position: absolute; top: 0; left: 0;
    transform: rotate(-90deg);
  }
  .hero-score-num {
    font-size: 28px; font-weight: 900;
    position: relative; z-index: 1;
  }
  .hero-score-label {
    font-size: 11px; color: var(--text-dim); margin-top: 4px;
  }

  /* 综合评语 */
  .summary-text {
    text-align: center;
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.8;
    padding: 0 8px;
    margin-top: 16px;
    animation: fadeUp 0.5s 0.6s both;
  }

  /* 五维雷达（用条形图模拟） */
  .dim-list { display: flex; flex-direction: column; gap: 16px; }
  .dim-row { display: flex; align-items: center; gap: 10px; }
  .dim-icon { font-size: 22px; width: 32px; text-align: center; flex-shrink: 0; }
  .dim-info { flex: 1; }
  .dim-top { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .dim-name { font-size: 13px; font-weight: 600; }
  .dim-val { font-size: 13px; font-weight: 800; }
  .dim-bar-bg {
    height: 8px; border-radius: 4px;
    background: rgba(255,255,255,0.05);
    overflow: hidden;
  }
  .dim-bar {
    height: 100%; border-radius: 4px;
    width: 0; transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .dim-tip {
    font-size: 11px; color: var(--text-dim);
    margin-top: 4px; font-style: italic;
  }

  /* 宜忌 */
  .yj-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .yj-col { display: flex; flex-direction: column; gap: 6px; }
  .yj-header {
    font-size: 20px; font-weight: 900;
    text-align: center;
    padding: 10px 0;
    border-radius: 12px;
    margin-bottom: 4px;
    letter-spacing: 4px;
  }
  .yj-col.yi .yj-header {
    background: linear-gradient(135deg, rgba(95,224,160,0.15), rgba(95,224,160,0.05));
    color: var(--good);
    border: 1px solid rgba(95,224,160,0.1);
  }
  .yj-col.ji .yj-header {
    background: linear-gradient(135deg, rgba(240,96,112,0.15), rgba(240,96,112,0.05));
    color: var(--bad);
    border: 1px solid rgba(240,96,112,0.1);
  }
  .yj-item {
    font-size: 13px;
    padding: 10px 12px;
    border-radius: 10px;
    text-align: center;
    font-weight: 500;
  }
  .yj-col.yi .yj-item { background: rgba(95,224,160,0.06); color: var(--good); }
  .yj-col.ji .yj-item { background: rgba(240,96,112,0.06); color: var(--bad); }

  /* 幸运物 */
  .lucky-center { text-align: center; padding: 8px 0; }
  .lucky-big { font-size: 64px; margin-bottom: 8px; animation: float 3s ease-in-out infinite; }
  .lucky-name { font-size: 18px; font-weight: 800; color: var(--accent); }
  .lucky-desc { font-size: 13px; color: var(--text-dim); margin-top: 6px; }
  .lucky-tip {
    margin-top: 12px;
    font-size: 11px;
    color: var(--text-dim);
    background: var(--accent-dim);
    display: inline-block;
    padding: 4px 14px;
    border-radius: 12px;
  }

  /* 同事匹配 */
  .compat-card {
    display: flex; align-items: center; gap: 14px;
    padding: 14px;
    background: rgba(255,255,255,0.03);
    border-radius: 14px;
    border: 1px solid var(--card-border);
    margin-bottom: 10px;
  }
  .compat-emoji { font-size: 36px; }
  .compat-info { flex: 1; }
  .compat-type { font-size: 14px; font-weight: 700; }
  .compat-desc { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .compat-tag {
    font-size: 11px; padding: 3px 10px; border-radius: 8px;
    font-weight: 600;
  }
  .tag-good { background: rgba(95,224,160,0.12); color: var(--good); }
  .tag-warn { background: rgba(245,197,66,0.12); color: var(--accent); }
  .tag-bad { background: rgba(240,96,112,0.12); color: var(--bad); }

  /* 金句 */
  .quote-wrap {
    text-align: center; padding: 16px 12px;
    position: relative;
  }
  .quote-mark {
    font-size: 48px; color: var(--accent); opacity: 0.2;
    position: absolute; line-height: 1;
  }
  .quote-mark.open { top: 0; left: 4px; }
  .quote-mark.close { bottom: 0; right: 4px; }
  .quote-content {
    font-size: 16px; font-weight: 600;
    line-height: 1.8;
    padding: 0 20px;
  }
  .quote-from {
    font-size: 12px; color: var(--text-dim);
    margin-top: 10px;
  }

  /* 工运走势 */
  .trend-chart {
    display: flex; align-items: flex-end; justify-content: space-between;
    height: 120px; padding: 0 4px;
    gap: 6px;
  }
  .trend-bar-wrap {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; height: 100%;
    justify-content: flex-end;
  }
  .trend-bar {
    width: 100%; border-radius: 6px 6px 2px 2px;
    min-height: 8px;
    transition: height 1s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }
  .trend-bar .val {
    position: absolute; top: -18px;
    left: 50%; transform: translateX(-50%);
    font-size: 10px; font-weight: 700;
    white-space: nowrap;
  }
  .trend-label {
    font-size: 10px; color: var(--text-dim);
    margin-top: 6px; text-align: center;
  }
  .trend-bar-wrap.today .trend-bar {
    box-shadow: 0 0 12px rgba(245,197,66,0.4);
  }
  .trend-bar-wrap.today .trend-label {
    color: var(--accent); font-weight: 700;
  }

  /* 底部操作 */
  .actions {
    display: flex; gap: 10px;
    margin-top: 20px;
  }
  .act-btn {
    flex: 1; padding: 16px; border-radius: 16px;
    border: none; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.25s;
    -webkit-tap-highlight-color: transparent;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .act-btn:active { transform: scale(0.96); }
  .btn-gold {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #1a1a2e;
    box-shadow: 0 4px 20px rgba(245,197,66,0.25);
  }
  .btn-glass {
    background: rgba(255,255,255,0.06);
    color: var(--text);
    border: 1px solid var(--card-border);
    backdrop-filter: blur(10px);
  }

  .disclaimer {
    text-align: center;
    font-size: 11px;
    color: rgba(119,119,170,0.4);
    padding: 28px 0 20px;
    line-height: 1.8;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 80px;
    left: 50%; transform: translateX(-50%) translateY(20px);
    background: rgba(30,30,60,0.95);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 12px 28px;
    border-radius: 24px;
    font-size: 14px; font-weight: 600;
    opacity: 0; pointer-events: none;
    transition: all 0.3s; z-index: 200;
    white-space: nowrap;
    backdrop-filter: blur(10px);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* 海报 Canvas */
  #posterCanvas { display: none; }

  /* 分享弹窗 */
  .share-modal {
    position: fixed; inset: 0;
    background: rgba(6,6,15,0.95);
    z-index: 150;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .share-modal.show { opacity: 1; pointer-events: all; }
  .share-poster {
    max-width: 340px; width: 100%;
    border-radius: 16px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.5);
  }
  .share-hint {
    color: var(--text-dim);
    font-size: 13px;
    margin-top: 16px;
    text-align: center;
  }
  .share-close {
    margin-top: 16px;
    padding: 12px 36px;
    border-radius: 24px;
    border: 1px solid var(--card-border);
    background: rgba(255,255,255,0.06);
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
  }
</style>
</head>
<body>

<canvas id="particleCanvas"></canvas>
<div class="glow-orb o1"></div>
<div class="glow-orb o2"></div>
<div class="glow-orb o3"></div>

<div class="loader-overlay" id="loader">

// ===== 粒子背景 =====
(function() {
  const c = document.getElementById('particleCanvas');
  const ctx = c.getContext('2d');
  let W, H, particles = [];
  function resize() {
    W = c.width = window.innerWidth;
    H = c.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();
  class P {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * W;
      this.y = Math.random() * H;
      this.r = Math.random() * 1.5 + 0.5;
      this.dx = (Math.random() - 0.5) * 0.3;
      this.dy = (Math.random() - 0.5) * 0.3;
      this.o = Math.random() * 0.5 + 0.2;
      this.phase = Math.random() * Math.PI * 2;
    }
    draw(t) {
      const flicker = 0.5 + 0.5 * Math.sin(t * 0.002 + this.phase);
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${this.o * flicker})`;
      ctx.fill();
      this.x += this.dx; this.y += this.dy;
      if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();
    }
  }
  for (let i = 0; i < 100; i++) particles.push(new P());
  function loop(t) {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => p.draw(t));
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();

const KEYS = ['dir', 'feat', 'week', 'num'];
const GRIDS = { dir: 'g_dir', feat: 'g_feat', week: 'g_week', num: 'g_num' };

Object.entries(GRIDS).forEach(([key, id]) => {
  document.getElementById(id).addEventListener('click', e => {
    const btn = e.target.closest('[data-v]');
    if (!btn) return;
    document.getElementById(id).querySelectorAll('[data-v]').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    S[key] = btn.dataset.v;
    updateSteps();
  });
});

function updateSteps() {
  const dots = document.querySelectorAll('.step-dot');
  KEYS.forEach((k, i) => {
    dots[i].classList.toggle('done', S[k] !== null);
    dots[i].classList.toggle('active', S[k] === null && (i === 0 || S[KEYS[i-1]] !== null));
  });
  document.getElementById('goBtn').disabled = !KEYS.every(k => S[k] !== null);
}

  fill.style.width = '0%';

  const steps = [
    { t: '正在连接工位能量场...', p: 15 },
    { t: '扫描你的打工磁场...', p: 30 },
    { t: '查询公司风水数据库...', p: 50 },

    { t: '生成今日宜忌...', p: 85 },
    { t: '占卜结果即将揭晓！', p: 100 },
  ];
  let i = 0;
  const ti = setInterval(() => {
    if (i < steps.length) {
      textEl.textContent = steps[i].t;
      fill.style.width = steps[i].p + '%';
      i++;
    }
  }, 500);

  setTimeout(() => {
    clearInterval(ti);
    overlay.classList.remove('show');
    showResult();
  }, 3200);
}

// ===== 伪随机 =====
function rng(seed) {
  let s = seed;
  return () => { s = (s * 16807 + 12345) % 2147483647; return (s & 0x7fffffff) / 0x7fffffff; };
}

function mkSeed(dateOffset) {
  const d = new Date(TODAY);
  d.setDate(d.getDate() + (dateOffset || 0));
  const dn = d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
  const dm = { east:3, south:7, west:11, north:13 };
  const fm = { window:17, corridor:23, toilet:29, boss:31, corner:37, center:41 };
  return dn + (dm[S.dir]||0) * 7 + (fm[S.feat]||0) * 3 + parseInt(S.week) * 19 + parseInt(S.num) * 53;
}

function pick(a, r) { return a[Math.floor(r() * a.length)]; }
function pickN(a, n, r) {
  const c = [...a], res = [];
  for (let i = 0; i < n && c.length; i++) res.push(c.splice(Math.floor(r() * c.length), 1)[0]);
  return res;
}

// ===== 生成结果 =====
let resultData = {};

function showResult() {
  const r = rng(mkSeed(0));
  const score = Math.floor(r() * 100);
  let level = LEVELS[0];
  for (const l of LEVELS) if (score >= l.min) level = l;
  const starN = Math.max(1, Math.min(5, Math.ceil(score / 20)));

  resultData = { score, level, starN };

  // ---- 总评 ----
  const sumPool = score >= 70 ? SUMMARIES.high : score >= 40 ? SUMMARIES.mid : SUMMARIES.low;
  document.getElementById('heroCard').innerHTML = `
    <div class="hero-emoji">${level.emoji}</div>
    <div class="hero-label" style="color:${level.color}">${level.label}</div>
    <div class="hero-stars" style="color:${level.color}">${'★'.repeat(starN)}${'☆'.repeat(5-starN)}</div>
    <div class="hero-score-ring">
      <svg width="80" height="80">
        <circle cx="40" cy="40" r="36" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="5"/>
        <circle cx="40" cy="40" r="36" fill="none" stroke="${level.color}" stroke-width="5"
          stroke-dasharray="${Math.PI*72}" stroke-dashoffset="${Math.PI*72*(1-score/100)}"
          stroke-linecap="round" style="transition:stroke-dashoffset 1.5s ease-out"/>
      </svg>
      <span class="hero-score-num" style="color:${level.color}">${score}</span>
    </div>
    <div class="hero-score-label">工运指数</div>
    <div class="summary-text">${pick(sumPool, r)}</div>
  `;

  // ---- 五维 ----
  const dimC = document.getElementById('dimList');
  dimC.innerHTML = '';
  const dimVals = [];
  DIMS.forEach(d => {
    const v = Math.max(5, Math.min(99, Math.floor(r() * 100)));
    dimVals.push(v);
    const tip = pick(d.tips, r);
    dimC.innerHTML += `
      <div class="dim-row">
        <span class="dim-icon">${d.icon}</span>
        <div class="dim-info">
          <div class="dim-top">
            <span class="dim-name">${d.name}</span>
            <span class="dim-val" style="color:${d.color}">${v}</span>
          </div>
          <div class="dim-bar-bg">
            <div class="dim-bar" style="background:linear-gradient(90deg,${d.color},${d.color}88);" data-w="${v}%"></div>
          </div>
          <div class="dim-tip">${tip}</div>
        </div>
      </div>
    `;
  });
  resultData.dimVals = dimVals;

  // ---- 宜忌 ----
  const yiArr = pickN(YI, 4, r);
  const jiArr = pickN(JI, 4, r);
  resultData.yi = yiArr; resultData.ji = jiArr;
  document.getElementById('yjGrid').innerHTML = `
    <div class="yj-col yi">
      <div class="yj-header">宜</div>
      ${yiArr.map(t => `<div class="yj-item">${t}</div>`).join('')}
    </div>
    <div class="yj-col ji">
      <div class="yj-header">忌</div>
      ${jiArr.map(t => `<div class="yj-item">${t}</div>`).join('')}
    </div>
  `;

  // ---- 幸运物 ----
  const lk = pick(LUCKY, r);
  resultData.lucky = lk;
  document.getElementById('luckyArea').innerHTML = `
    <div class="lucky-big">${lk.icon}</div>
    <div class="lucky-name">${lk.name}</div>
    <div class="lucky-desc">${lk.desc}</div>
    <div class="lucky-tip">💡 ${lk.tip}</div>
  `;

  // ---- 同事相性 ----
  const compats = pickN(COMPAT, 3, r);
  resultData.compats = compats;
  document.getElementById('compatArea').innerHTML = compats.map(c => `
    <div class="compat-card">
      <div class="compat-emoji">${c.emoji}</div>
      <div class="compat-info">
        <div class="compat-type">${c.type}</div>
        <div class="compat-desc">${c.desc}</div>
      </div>
      <span class="compat-tag ${c.tags[0]}">${c.tags[1]}</span>
    </div>
  `).join('');

  // ---- 走势 ----
  const tc = document.getElementById('trendChart');
  tc.innerHTML = '';
  const dayLabels = [];
  const dayScores = [];
  for (let i = -3; i <= 3; i++) {
    const dr = rng(mkSeed(i));
    const ds = Math.floor(dr() * 100);
    dayScores.push(ds);
    const dd = new Date(TODAY); dd.setDate(dd.getDate() + i);
    dayLabels.push(i === 0 ? '今天' : `${dd.getMonth()+1}/${dd.getDate()}`);
  }
  const maxS = Math.max(...dayScores, 1);
  dayScores.forEach((ds, i) => {
    const h = Math.max(12, (ds / maxS) * 100);
    const isToday = i === 3;
    const barColor = ds >= 70 ? 'var(--good)' : ds >= 40 ? 'var(--accent)' : 'var(--bad)';
    tc.innerHTML += `
      <div class="trend-bar-wrap ${isToday ? 'today' : ''}">
        <div class="trend-bar" style="background:${barColor};height:0;" data-h="${h}%">
          <span class="val" style="color:${barColor}">${ds}</span>
        </div>
        <div class="trend-label">${dayLabels[i]}</div>
      </div>
    `;
  });

  // ---- 金句 ----
  const q = pick(QUOTES, r);
  resultData.quote = q;
  document.getElementById('quoteArea').innerHTML = `
    <span class="quote-mark open">"</span>
    <div class="quote-content">${q.text}</div>
    <div class="quote-from">—— ${q.from}</div>
    <span class="quote-mark close">"</span>
  `;

  // 切换页面
  document.getElementById('inputPage').classList.add('hidden');
  document.getElementById('resultPage').classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // 动画
  setTimeout(() => {
    document.querySelectorAll('.dim-bar').forEach(b => b.style.width = b.dataset.w);
    document.querySelectorAll('.trend-bar[data-h]').forEach(b => b.style.height = b.dataset.h);
  }, 200);
}

// ===== 重测 =====
function retest() {
  document.getElementById('resultPage').classList.add('hidden');
  document.getElementById('inputPage').classList.remove('hidden');
  document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
  S.dir = S.feat = S.week = S.num = null;
  document.getElementById('goBtn').disabled = true;
  updateSteps();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== 生成海报 =====
function genPoster() {
  const canvas = document.getElementById('posterCanvas');
  const ctx = canvas.getContext('2d');
  const W = 750, H = 1334;
  canvas.width = W; canvas.height = H;

  // 背景
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a0a1a');
  grad.addColorStop(0.5, '#12122a');
  grad.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // 星星
  for (let i = 0; i < 60; i++) {
    ctx.beginPath();
    ctx.arc(Math.random()*W, Math.random()*H, Math.random()*1.5+0.5, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${Math.random()*0.4+0.1})`;
    ctx.fill();
  }

  // 标题
  ctx.textAlign = 'center';
  ctx.font = '900 60px PingFang SC, sans-serif';
  ctx.fillStyle = '#f5c542';
  ctx.fillText('🏢 工运', W/2, 100);

  ctx.font = '400 24px PingFang SC, sans-serif';
  ctx.fillStyle = '#7777aa';
  ctx.fillText('打工人每日运势', W/2, 140);

  // 日期
  ctx.font = '400 20px PingFang SC, sans-serif';
  ctx.fillStyle = '#f5c542';
  const dateStr = `${TODAY.getFullYear()}年${TODAY.getMonth()+1}月${TODAY.getDate()}日 星期${WEEKNAMES[TODAY.getDay()]}`;
  ctx.fillText(dateStr, W/2, 180);

  // 分割线
  ctx.strokeStyle = 'rgba(245,197,66,0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(100, 210); ctx.lineTo(W-100, 210); ctx.stroke();

  // 总评
  ctx.font = '80px serif';
  ctx.fillText(resultData.level.emoji, W/2, 310);

  ctx.font = '900 56px PingFang SC, sans-serif';
  ctx.fillStyle = resultData.level.color;
  ctx.fillText(resultData.level.label, W/2, 380);

  ctx.font = '36px serif';
  const stars = '★'.repeat(resultData.starN) + '☆'.repeat(5 - resultData.starN);
  ctx.fillText(stars, W/2, 430);

  ctx.font = '900 48px PingFang SC, sans-serif';
  ctx.fillText(resultData.score, W/2, 500);
  ctx.font = '400 18px PingFang SC, sans-serif';
  ctx.fillStyle = '#7777aa';
  ctx.fillText('工运指数', W/2, 530);

  // 五维
  ctx.strokeStyle = 'rgba(245,197,66,0.15)';
  ctx.beginPath(); ctx.moveTo(60, 570); ctx.lineTo(W-60, 570); ctx.stroke();

  ctx.textAlign = 'left';
  DIMS.forEach((d, i) => {
    const y = 620 + i * 50;
    ctx.font = '28px serif';
    ctx.fillText(d.icon, 80, y);
    ctx.font = '600 22px PingFang SC, sans-serif';
    ctx.fillStyle = '#e8e8f0';
    ctx.fillText(d.name, 120, y);
    // bar
    const bw = 340;
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    roundRect(ctx, 240, y - 14, bw, 12, 6); ctx.fill();
    ctx.fillStyle = d.color;
    roundRect(ctx, 240, y - 14, bw * resultData.dimVals[i] / 100, 12, 6); ctx.fill();
    ctx.textAlign = 'right';
    ctx.font = '800 22px PingFang SC, sans-serif';
    ctx.fillStyle = d.color;
    ctx.fillText(resultData.dimVals[i], W - 80, y);
    ctx.textAlign = 'left';
  });

  // 宜忌
  const yjY = 900;
  ctx.strokeStyle = 'rgba(245,197,66,0.15)';
  ctx.beginPath(); ctx.moveTo(60, yjY - 20); ctx.lineTo(W-60, yjY - 20); ctx.stroke();

  ctx.textAlign = 'center';
  ctx.font = '800 28px PingFang SC, sans-serif';
  ctx.fillStyle = '#5fe0a0';
  ctx.fillText('✅ 宜', W/4, yjY + 20);
  ctx.fillStyle = '#f06070';
  ctx.fillText('❌ 忌', W*3/4, yjY + 20);

  ctx.font = '400 20px PingFang SC, sans-serif';
  resultData.yi.forEach((t, i) => {
    ctx.fillStyle = '#5fe0a0';
    ctx.fillText(t, W/4, yjY + 60 + i * 36);
  });
  resultData.ji.forEach((t, i) => {
    ctx.fillStyle = '#f06070';
    ctx.fillText(t, W*3/4, yjY + 60 + i * 36);
  });

  // 幸运物
  const lkY = 1120;
  ctx.fillStyle = '#f5c542';
  ctx.font = '600 20px PingFang SC, sans-serif';
  ctx.fillText(`🍀 幸运物：${resultData.lucky.icon} ${resultData.lucky.name}`, W/2, lkY);
  ctx.fillStyle = '#7777aa';
  ctx.font = '400 16px PingFang SC, sans-serif';
  ctx.fillText(resultData.lucky.desc, W/2, lkY + 30);

  // 金句
  ctx.fillStyle = 'rgba(245,197,66,0.3)';
  ctx.font = '400 16px PingFang SC, sans-serif';
  ctx.fillText(`"${resultData.quote.text}"`, W/2, lkY + 80);
  ctx.fillStyle = '#7777aa';
  ctx.fillText(`—— ${resultData.quote.from}`, W/2, lkY + 110);

  // 底部
  ctx.fillStyle = 'rgba(119,119,170,0.4)';
  ctx.font = '400 16px PingFang SC, sans-serif';
  ctx.fillText('扫码或搜索「工运」测你的打工运势', W/2, H - 40);

  // 显示
  const dataUrl = canvas.toDataURL('image/png');
  document.getElementById('sharePosterImg').src = dataUrl;
  document.getElementById('shareModal').classList.add('show');
}

function closeShare() {
  document.getElementById('shareModal').classList.remove('show');
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
